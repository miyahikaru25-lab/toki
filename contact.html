<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ - TOKI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-logo"><img src="img/toki.png" alt="刻"></a>
  <button class="hamburger" aria-label="メニューを開く" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <nav><ul class="site-nav">
    <li><a href="about.html">刻について</a></li>
    <li><a href="news.html">お知らせ</a></li>
    <li><a href="pickup.html">製品ピックアップ</a></li>
    <li><a href="products.html">製品一覧</a></li>
    <li><a href="contact.html" class="active">お問い合わせ</a></li>
  </ul></nav>
</header>

<!-- PAGE TITLE (centered, large) -->
<div class="page-header-center reveal">
  <h1 class="page-title">お問い合わせ</h1>
  <div class="gold-line-center"></div>
  <div class="gold-rule"></div>
</div>

<div class="contact-content">
  <div class="contact-form-wrap reveal">
    <div class="form-group">
      <label class="form-label">お名前（または会社名・担当者名）</label>
      <input type="text" class="form-field" placeholder="例：株式会社〇〇 山田 太郎" required>
    </div>
    <div class="form-group">
      <label class="form-label">メールアドレス</label>
      <input type="email" class="form-field" placeholder="例：example@company.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">お問い合わせ内容</label>
      <textarea class="form-field form-textarea" placeholder="料金プランについて詳しく知りたい、など" required></textarea>
    </div>
    <div class="form-footer-row">
      <p class="form-note">※ご入力いただいた個人情報は、お問い合わせへの返信のみに使用し、第三者への提供は行いません。</p>
      <button class="btn-send" type="submit">送信</button>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-body">
    <a href="index.html" class="footer-logo"><img src="img/toki2.png" alt="刻"></a>
    <nav class="footer-nav-cols">
      <ul class="footer-nav-col">
        <li><a href="about.html">刻について</a></li>
        <li><a href="pickup.html">製品ピックアップ</a></li>
        <li><a href="products.html">製品一覧</a></li>
      </ul>
      <ul class="footer-nav-col">
        <li><a href="news.html">お知らせ</a></li>
        <li><a href="contact.html">お問い合わせ</a></li>
      </ul>
    </nav>
    <div class="footer-social">
      <a href="#"><img src="img/Instagram_Glyph_Black.png" alt="instagram"></a>
      <a href="#"><img class="footer-y" src="img/yt_icon_almostblack_digital.png" alt="youtube"></a>
      <a href="#"><img src="img/logo-black.png" alt="x"></a>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="footer-legal">
      <a href="#">会社概要</a>
      <a href="#">プライバシーポリシー</a>
      <a href="#">特定商取引法について</a>
    </div>
  </div>
</footer>

<script src="hamburger.js"></script>
<script src="animations.js"></script>
</body>
</html>
